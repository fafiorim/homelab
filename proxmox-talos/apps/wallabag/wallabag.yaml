apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallabag
  namespace: wallabag
  labels:
    app: wallabag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wallabag
  template:
    metadata:
      labels:
        app: wallabag
    spec:
      initContainers:
      - name: wait-for-redis
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z redis 6379; do echo waiting for redis; sleep 2; done']
      - name: wait-for-postgresql
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z postgresql 5432; do echo waiting for postgresql; sleep 2; done']
      containers:
      - name: wallabag
        image: wallabag/wallabag:latest
        ports:
        - containerPort: 80
        env:
        - name: SYMFONY__ENV__DATABASE_DRIVER
          value: "pdo_pgsql"
        - name: SYMFONY__ENV__DATABASE_HOST
          value: "postgresql"
        - name: SYMFONY__ENV__DATABASE_PORT
          value: "5432"
        - name: SYMFONY__ENV__DATABASE_NAME
          value: "wallabag"
        - name: SYMFONY__ENV__DATABASE_USER
          value: "wallabag"
        - name: SYMFONY__ENV__DATABASE_PASSWORD
          value: "wallabag"
        - name: SYMFONY__ENV__REDIS_HOST
          value: "redis"
        - name: SYMFONY__ENV__REDIS_PORT
          value: "6379"
        - name: SYMFONY__ENV__DOMAIN_NAME
          value: "https://wallabag.botocudo.net"
        - name: SYMFONY__ENV__SERVER_NAME
          value: "Wallabag"
        - name: SYMFONY__ENV__FOSUSER_REGISTRATION
          value: "false"
        - name: POPULATE_DATABASE
          value: "false"
        volumeMounts:
        - name: data
          mountPath: /var/www/wallabag/data
        - name: images
          mountPath: /var/www/wallabag/web/assets/images
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 90
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: wallabag-data-pvc
      - name: images
        persistentVolumeClaim:
          claimName: wallabag-images-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: wallabag
  namespace: wallabag
  labels:
    app: wallabag
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: wallabag
