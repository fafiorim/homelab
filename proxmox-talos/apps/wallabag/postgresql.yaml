apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
  namespace: wallabag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
      - name: postgresql
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "wallabag"
        - name: POSTGRES_USER
          value: "wallabag"
        - name: POSTGRES_PASSWORD
          value: "wallabag"
        - name: PGDATA
          value: "/var/lib/postgresql/data/pgdata"
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: postgres-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: wallabag
spec:
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: postgresql
